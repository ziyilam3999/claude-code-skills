name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every skills/* subdirectory has a SKILL.md
        run: |
          missing=0
          for dir in skills/*/; do
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "MISSING: $dir/SKILL.md"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing skill directory/directories missing SKILL.md"
            exit 1
          fi
          echo "All skills have SKILL.md"
