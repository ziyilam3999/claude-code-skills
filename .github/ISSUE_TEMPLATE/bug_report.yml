name: Bug Report
description: A skill isn't working as expected
labels: [bug]
body:
  - type: input
    id: skill-name
    attributes:
      label: Which skill?
      placeholder: e.g. ship, checkpoint, mailbox
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Which slash command did you run, what inputs, what did Claude do
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: output of `claude --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14 / Windows 11 / Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste any error output or unexpected Claude response
